# docker-compose.yml

services:

  # ─── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: resume_extractor_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:password@db:5432/resume_db
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      - OCR_USE_GPU=False
      - SKILLS_FUZZY_THRESHOLD=80
      - MAX_UPLOAD_SIZE_MB=10
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./temp:/app/temp
      - ./app/matching/taxonomy:/app/app/matching/taxonomy
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resume_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: resume_extractor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       resume_db
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - resume_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── pgAdmin (optional — DB GUI) ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: resume_extractor_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "5050:5050"
    depends_on:
      - db
    networks:
      - resume_network
    profiles:
      - tools   # Only starts with: docker-compose --profile tools up

  # ─── Redis (optional — for task queue) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resume_extractor_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - resume_network
    profiles:
      - full   # Only starts with: docker-compose --profile full up

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  resume_network:
    driver: bridge
